<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Family Forum</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           var(--hub-bg, #f9fafb);
      --card:         var(--hub-surface, #ffffff);
      --border:       var(--hub-border, #e5e7eb);
      --border-mid:   var(--hub-border, #d1d5db);
      --text:         var(--hub-text, #111827);
      --muted:        var(--hub-text-muted, #6b7280);
      --accent:       var(--hub-primary, #111827);
      --accent-hover: var(--hub-primary-hover, #374151);
      --accent-light: #f3f4f6;
      --radius:       var(--hub-radius, 0.5rem);
      --shadow:       0 1px 3px rgba(0,0,0,.07);
      --shadow-md:    0 4px 12px rgba(0,0,0,.1);
      --red:    #dc2626; --red-light:   #fee2e2;
      --green:  #059669; --green-light: #d1fae5;
      --amber:  #d97706;
    }

    body {
      font-family: var(--hub-font, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: var(--hub-font-size, 15px);
      line-height: 1.5;
    }

    .app { max-width: 720px; margin: 0 auto; padding: 16px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; border-radius: 8px; font-size: 0.875rem;
      font-weight: 600; cursor: pointer; border: none;
      transition: opacity .15s, background .15s; text-decoration: none;
    }
    .btn:disabled { opacity: .45; cursor: default; }
    .btn-primary { background: var(--accent); color: var(--hub-primary-fg, #fff); }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border-mid); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: var(--red); color: white; }
    .btn-danger:hover:not(:disabled) { opacity: .88; }
    .btn-sm { padding: 5px 12px; font-size: 0.8rem; }
    .btn-xs { padding: 3px 8px; font-size: 0.75rem; }

    /* ── Cards ── */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
    }

    /* ── Page header ── */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; gap: 10px; flex-wrap: wrap;
    }
    .page-header h1 { font-size: 1.25rem; font-weight: 700; }
    .page-header .header-actions { display: flex; gap: 8px; align-items: center; }

    /* ── Category tabs ── */
    .category-tabs {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .cat-tab {
      padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; border: 2px solid transparent; transition: all .15s;
      background: var(--accent-light); color: var(--muted);
    }
    .cat-tab.active { color: #fff; border-color: transparent; }
    .cat-tab:not(.active):hover { border-color: var(--border-mid); }

    /* ── Thread list ── */
    .thread-list { display: flex; flex-direction: column; gap: 8px; }

    .thread-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      cursor: pointer; transition: box-shadow .15s, border-color .15s;
    }
    .thread-card:hover { box-shadow: var(--shadow-md); border-color: var(--border-mid); }
    .thread-card-inner { padding: 14px 16px; }

    .thread-title {
      font-weight: 700; font-size: 1rem; margin-bottom: 4px; line-height: 1.35;
      display: flex; align-items: center; gap: 6px;
    }
    .pin-icon { font-size: 0.85rem; }
    .thread-preview {
      font-size: 0.85rem; color: var(--muted); margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .thread-meta {
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
      font-size: 0.78rem; color: var(--muted);
    }
    .thread-meta .sep { color: var(--border-mid); }

    /* ── Badges ── */
    .badge {
      display: inline-block; padding: 1px 8px; border-radius: 20px;
      font-size: 0.72rem; font-weight: 700; color: #fff;
    }
    .badge-muted { background: #e5e7eb; color: var(--muted); }

    /* ── Thread detail ── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 0.82rem; color: var(--accent); cursor: pointer;
      background: none; border: none; padding: 0; margin-bottom: 12px; font-weight: 600;
    }
    .back-btn:hover { opacity: .75; }

    .thread-detail-header {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px; margin-bottom: 10px;
      box-shadow: var(--shadow);
    }
    .thread-detail-title {
      font-size: 1.2rem; font-weight: 700; line-height: 1.35; margin-bottom: 8px;
    }
    .thread-detail-meta {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
      font-size: 0.82rem; color: var(--muted); margin-bottom: 12px;
    }
    .thread-detail-actions {
      display: flex; gap: 6px; margin-top: 10px; padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    /* ── Markdown body ── */
    .md-body { font-size: 0.92rem; line-height: 1.65; color: var(--text); }
    .md-body h1 { font-size: 1.3rem; font-weight: 700; margin: 14px 0 6px; }
    .md-body h2 { font-size: 1.1rem; font-weight: 700; margin: 12px 0 5px; }
    .md-body h3 { font-size: 1rem;   font-weight: 700; margin: 10px 0 4px; }
    .md-body p  { margin: 6px 0; }
    .md-body ul, .md-body ol { margin: 6px 0 6px 20px; }
    .md-body li { margin: 2px 0; }
    .md-body blockquote {
      border-left: 3px solid var(--border-mid); padding-left: 12px;
      color: var(--muted); margin: 8px 0; font-style: italic;
    }
    .md-body code {
      background: var(--accent-light); border-radius: 4px;
      padding: 1px 5px; font-size: 0.85em; font-family: monospace;
    }
    .md-body pre {
      background: #1e293b; color: #e2e8f0; border-radius: 8px;
      padding: 14px 16px; overflow-x: auto; margin: 8px 0;
    }
    .md-body pre code { background: none; padding: 0; color: inherit; font-size: 0.88em; }
    .md-body a { color: var(--accent); text-decoration: underline; }
    .md-body strong { font-weight: 700; }
    .md-body em { font-style: italic; }
    .md-body s { text-decoration: line-through; opacity: .75; }

    /* ── Reactions ── */
    .reactions {
      display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px;
    }
    .reaction-btn {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 9px; border-radius: 20px; font-size: 0.82rem;
      border: 1.5px solid var(--border); background: var(--card);
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .reaction-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .reaction-btn.reacted { background: var(--accent-light); border-color: var(--accent); font-weight: 700; }
    .reaction-add {
      padding: 3px 9px; border-radius: 20px; font-size: 0.82rem;
      border: 1.5px dashed var(--border-mid); background: transparent;
      cursor: pointer; color: var(--muted); transition: all .15s; font-family: inherit;
    }
    .reaction-add:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Emoji picker ── */
    .emoji-picker {
      display: inline-flex; gap: 4px; background: var(--card);
      border: 1px solid var(--border); border-radius: 8px; padding: 5px 8px;
      box-shadow: var(--shadow-md); align-items: center;
    }
    .emoji-opt {
      font-size: 1.1rem; cursor: pointer; padding: 2px 4px;
      border-radius: 4px; border: none; background: transparent;
      transition: background .1s;
    }
    .emoji-opt:hover { background: var(--accent-light); }

    /* ── Replies ── */
    .replies-section { margin-top: 10px; }
    .replies-header {
      font-size: 0.78rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .06em;
      padding: 0 0 8px; margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .reply-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px;
    }
    .reply-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
    }
    .avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 800; color: white;
    }
    .reply-author { font-size: 0.82rem; font-weight: 600; }
    .reply-date   { font-size: 0.75rem; color: var(--muted); }
    .reply-delete {
      margin-left: auto; opacity: 0; font-size: 0.75rem; color: var(--red);
      background: none; border: none; cursor: pointer; padding: 2px 6px;
      border-radius: 4px; transition: opacity .15s;
    }
    .reply-card:hover .reply-delete { opacity: 1; }
    .reply-delete:hover { background: var(--red-light); }

    /* ── Reply form ── */
    .reply-form {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px; margin-top: 8px;
    }
    .reply-form h4 { font-size: 0.85rem; font-weight: 700; margin-bottom: 10px; }

    /* ── Markdown editor ── */
    .md-editor { position: relative; }
    .md-editor textarea {
      width: 100%; border: 1.5px solid var(--border-mid); border-radius: 8px;
      padding: 10px 12px; font-size: 0.88rem; font-family: monospace;
      resize: vertical; min-height: 90px; outline: none; line-height: 1.55;
      transition: border-color .15s;
    }
    .md-editor textarea:focus { border-color: var(--accent); }
    .md-toolbar {
      display: flex; gap: 5px; margin-bottom: 5px; flex-wrap: wrap;
    }
    .md-toolbar button {
      padding: 3px 8px; font-size: 0.75rem; border: 1px solid var(--border-mid);
      border-radius: 4px; background: var(--card); cursor: pointer;
      color: var(--muted); font-family: inherit; transition: all .12s;
    }
    .md-toolbar button:hover { border-color: var(--accent); color: var(--accent); }
    .md-toolbar .sep-v { width: 1px; background: var(--border-mid); margin: 0 2px; }
    .md-preview-area {
      border: 1.5px solid var(--border-mid); border-radius: 8px;
      padding: 10px 12px; min-height: 90px; font-size: 0.88rem;
    }
    .preview-toggle {
      font-size: 0.75rem; color: var(--muted); cursor: pointer;
      background: none; border: none; padding: 0; margin-bottom: 5px;
      display: block; font-family: inherit;
    }
    .preview-toggle:hover { color: var(--accent); }

    /* ── Modal ── */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      display: flex; align-items: flex-end; justify-content: center; z-index: 100;
    }
    @media (min-width: 540px) { .modal-backdrop { align-items: center; padding: 20px; } }
    .modal {
      background: var(--card); border-radius: var(--radius) var(--radius) 0 0;
      width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; padding: 24px;
    }
    @media (min-width: 540px) { .modal { border-radius: var(--radius); } }
    .modal h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 16px; }

    /* ── Form ── */
    .form-group { margin-bottom: 14px; }
    .form-group label {
      display: block; font-size: 0.8rem; font-weight: 600;
      color: var(--muted); margin-bottom: 4px;
    }
    .form-group input[type="text"],
    .form-group select {
      width: 100%; border: 1.5px solid var(--border-mid); border-radius: 8px;
      padding: 8px 12px; font-size: 0.9rem; outline: none;
      transition: border-color .15s; font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    .modal-actions .btn { flex: 1; justify-content: center; }

    /* ── Who screen ── */
    #who-screen { text-align: center; padding: 48px 16px; }
    #who-screen h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    #who-screen p  { color: var(--muted); margin-bottom: 28px; }
    .member-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 10px; max-width: 400px; margin: 0 auto;
    }
    .member-btn {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 18px 10px; background: var(--card); border: 2px solid var(--border);
      border-radius: var(--radius); cursor: pointer; font-size: 0.85rem;
      font-weight: 600; color: var(--text); transition: all .15s;
    }
    .member-btn:hover { border-color: var(--accent); background: var(--accent-light); }
    .avatar-lg {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; font-weight: 800; color: white;
    }

    /* ── Settings ── */
    .cat-row {
      display: flex; align-items: center; gap: 8px; padding: 9px 0;
      border-bottom: 1px solid var(--border);
    }
    .cat-row:last-child { border-bottom: none; }
    .cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cat-name-input {
      flex: 1; border: 1px solid var(--border-mid); border-radius: 6px;
      padding: 4px 8px; font-size: 0.85rem; font-family: inherit; outline: none;
    }
    .cat-name-input:focus { border-color: var(--accent); }
    .color-swatches { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
    .swatch {
      width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
      border: 2px solid transparent; transition: border-color .1s;
    }
    .swatch.selected { border-color: var(--text); }

    /* ── Empty / loading ── */
    .empty { text-align: center; padding: 40px 16px; color: var(--muted); font-size: 0.9rem; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
    .loading { text-align: center; padding: 48px; color: var(--muted); }
    .error-msg {
      background: var(--red-light); color: var(--red); border-radius: 8px;
      padding: 9px 13px; font-size: 0.85rem; margin-bottom: 12px;
    }
  </style>
<base href="/run/forum/">

<body>
<div class="app">
  <div id="root"><div class="loading">Loading…</div></div>
</div>

<script type="module">
import { memberColor, initial, esc, isAdult, formatRelativeDate, hubConfirm } from "/hub-sdk.js";
import {
  renderMarkdown, applyInline, stripMarkdown,
  groupReactions, hasReacted, reactionSummary, sortThreads,
} from "./logic.js";

// ── Runtime globals ───────────────────────────────────────────────────────────
const CONTEXT    = window.__CONTEXT_URL ?? "";
const DB         = window.__DB_URL      ?? "";
const APP_ID     = window.__APP_ID      ?? "forum";
const HUB_MEMBER = window.__CURRENT_MEMBER ?? null;

const REACTION_EMOJIS = ["👍","❤️","😂","😮","🙏","👏"];
const CATEGORY_COLORS = [
  "#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#06b6d4","#f97316","#6b7280",
];
const DEFAULT_CATEGORIES = [
  { id: "announcements", name: "Announcements", color: "#3b82f6", position: 0 },
  { id: "planning",      name: "Planning",      color: "#10b981", position: 1 },
  { id: "random",        name: "Random",        color: "#6b7280", position: 2 },
  { id: "questions",     name: "Questions",     color: "#f59e0b", position: 3 },
];

// ── State ─────────────────────────────────────────────────────────────────────
let members        = [];
let currentMember  = null;
let pendingDeepLinkThreadId = null;
let view           = "list";      // "list" | "thread"
let threads        = [];
let currentThread  = null;
let currentReplies = [];
let categories     = [];
let reactions      = {};          // grouped reaction map
let categoryFilter = null;        // null = all
let pickerTarget   = null;        // { targetId, targetType } for emoji picker
let previewMode    = false;       // markdown preview toggle in new-thread modal
let replyPreview   = false;       // preview in reply form

// ── DB helper ─────────────────────────────────────────────────────────────────
async function dbq(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sql, params }),
  });
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

function uuid() { return crypto.randomUUID(); }

// ── Schema setup ──────────────────────────────────────────────────────────────
async function setupSchema() {
  // Schema managed by hub migrations (migrations/001_init.sql)
}

// Returns the configured auto-delete threshold in days (0 = disabled).
async function getAutoDeleteDays() {
  const { rows } = await dbq(`SELECT value FROM forum_settings WHERE key = 'auto_delete_days'`);
  return rows[0] ? parseInt(rows[0].value, 10) : 90;
}

async function saveAutoDeleteDays(days) {
  await dbq(`INSERT INTO forum_settings (key, value) VALUES ('auto_delete_days', ?) ON CONFLICT (key) DO UPDATE SET value = EXCLUDED.value`, [String(days)]);
}

// Delete threads (and their replies/reactions) older than the configured threshold.
async function runAutoDelete() {
  const days = await getAutoDeleteDays();
  if (!days || days <= 0) return; // 0 = disabled
  const cutoff = new Date(Date.now() - days * 86400_000).toISOString();
  // Reactions on old threads
  await dbq(`DELETE FROM reactions WHERE target_id IN (SELECT id FROM threads WHERE created_at < ?)`, [cutoff]);
  // Reactions on replies to old threads
  await dbq(`DELETE FROM reactions WHERE target_id IN (
    SELECT r.id FROM replies r JOIN threads t ON r.thread_id = t.id WHERE t.created_at < ?
  )`, [cutoff]);
  // Replies to old threads
  await dbq(`DELETE FROM replies WHERE thread_id IN (SELECT id FROM threads WHERE created_at < ?)`, [cutoff]);
  // The old threads themselves (never delete pinned ones — admin pinned them deliberately)
  await dbq(`DELETE FROM threads WHERE created_at < ? AND pinned = 0`, [cutoff]);
}

// ── Data loading ──────────────────────────────────────────────────────────────
async function loadMembers() {
  if (!CONTEXT) {
    members = [
      { id: "demo-1", name: "Alex",  role: "adult" },
      { id: "demo-2", name: "Jordan", role: "adult" },
      { id: "demo-3", name: "Casey", role: "child" },
      { id: "demo-4", name: "Riley", role: "child" },
    ];
    return;
  }
  try {
    const res = await fetch(`${CONTEXT}?keys=family.members`);
    members = ((await res.json())["family.members"]) ?? [];
  } catch { members = []; }
}

async function loadCategories() {
  const { rows } = await dbq(`SELECT * FROM categories ORDER BY position, name`);
  categories = rows;
}

async function loadThreads() {
  const catClause = categoryFilter ? `WHERE t.category_id = ?` : "";
  const params = categoryFilter ? [categoryFilter] : [];
  const { rows } = await dbq(`
    SELECT t.*,
      (SELECT COUNT(*) FROM replies WHERE thread_id = t.id)   AS reply_count,
      (SELECT COUNT(*) FROM reactions WHERE target_id = t.id) AS reaction_count
    FROM threads t ${catClause}
    ORDER BY t.pinned DESC, t.created_at DESC
  `, params);
  threads = rows.map(r => ({ ...r, pinned: !!r.pinned }));
}

async function loadThread(id) {
  const { rows: tr } = await dbq(`SELECT * FROM threads WHERE id = ?`, [id]);
  currentThread = tr[0] ? { ...tr[0], pinned: !!tr[0].pinned } : null;
  if (!currentThread) return;

  const { rows: rp } = await dbq(
    `SELECT * FROM replies WHERE thread_id = ? ORDER BY created_at ASC`, [id]
  );
  currentReplies = rp;

  // Load all reactions for the thread and its replies in one query
  const replyIds = rp.map(r => r.id);
  const allIds   = [id, ...replyIds];
  const placeholders = allIds.map(() => "?").join(",");
  const { rows: rx } = await dbq(
    `SELECT target_id, target_type, emoji, author_id FROM reactions WHERE target_id IN (${placeholders})`,
    allIds
  );
  reactions = groupReactions(rx);
}

// ── Actions ───────────────────────────────────────────────────────────────────
async function createThread(title, body, categoryId) {
  const id  = uuid();
  const now = new Date().toISOString();
  await dbq(
    `INSERT INTO threads (id, title, body, category_id, author_id, author_name, pinned, created_at, updated_at)
     VALUES (?,?,?,?,?,?,0,?,?)`,
    [id, title.trim(), body.trim(), categoryId || null,
     currentMember.id, currentMember.name, now, now]
  );
  // Post activity to hub
  if (CONTEXT) {
    fetch("/api/messages", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        authorName: "Forum",
        body: `💬 ${currentMember.name} started a new thread: "${title.trim().slice(0, 60)}"`,
        url: `/run/${APP_ID}?threadId=${id}`,
      }),
    }).catch(() => {});
    fetch(`/run/${APP_ID}/api/events`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ type: "forum.post.created", subject_id: id, payload: { author: currentMember.name, title: title.trim() } }),
    }).catch(() => {});
    fetch("/api/activity", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        type: "message_posted",
        actor: currentMember.name,
        description: `${currentMember.name} started a new thread: "${title.trim().slice(0, 60)}"`,
        metadata: { deepLink: { appId: APP_ID, params: { threadId: id } } },
      }),
    }).catch(() => {});
  }
  return id;
}

async function createReply(threadId, body) {
  const id  = uuid();
  const now = new Date().toISOString();
  await dbq(
    `INSERT INTO replies (id, thread_id, body, author_id, author_name, created_at)
     VALUES (?,?,?,?,?,?)`,
    [id, threadId, body.trim(), currentMember.id, currentMember.name, now]
  );
}

async function toggleReaction(targetId, targetType, emoji) {
  if (!currentMember) return;
  const already = hasReacted(reactions, targetId, emoji, currentMember.id);
  if (already) {
    await dbq(
      `DELETE FROM reactions WHERE target_id=? AND emoji=? AND author_id=?`,
      [targetId, emoji, currentMember.id]
    );
  } else {
    await dbq(
      `INSERT INTO reactions (id, target_id, target_type, emoji, author_id) VALUES (?,?,?,?,?) ON CONFLICT (target_id, emoji, author_id) DO NOTHING`,
      [uuid(), targetId, targetType, emoji, currentMember.id]
    );
  }
  await loadThread(currentThread.id);
  pickerTarget = null;
  render();
}

async function togglePin(threadId) {
  const t = threads.find(t => t.id === threadId) ?? currentThread;
  if (!t) return;
  const next = t.pinned ? 0 : 1;
  await dbq(`UPDATE threads SET pinned=? WHERE id=?`, [next, threadId]);
  await loadThreads();
  if (currentThread?.id === threadId) await loadThread(threadId);
  render();
}

async function deleteThread(threadId) {
  if (!await hubConfirm({ message: "Delete this thread?", description: "The thread and all its replies will be permanently removed.", confirmLabel: "Delete thread", destructive: true })) return;
  await dbq(`DELETE FROM reactions WHERE target_id = ?`, [threadId]);
  await dbq(`DELETE FROM reactions WHERE target_id IN (SELECT id FROM replies WHERE thread_id=?)`, [threadId]);
  await dbq(`DELETE FROM replies WHERE thread_id = ?`, [threadId]);
  await dbq(`DELETE FROM threads WHERE id = ?`, [threadId]);
  backToList();
}

async function deleteReply(replyId) {
  if (!await hubConfirm({ message: "Delete this reply?", confirmLabel: "Delete", destructive: true })) return;
  await dbq(`DELETE FROM reactions WHERE target_id=?`, [replyId]);
  await dbq(`DELETE FROM replies WHERE id=?`, [replyId]);
  await loadThread(currentThread.id);
  render();
}

// Category management
async function saveCategory(id, name, color) {
  await dbq(`UPDATE categories SET name=?, color=? WHERE id=?`, [name, color, id]);
  await loadCategories();
  render();
}

async function addCategory(name, color) {
  const id  = uuid();
  const pos = categories.length;
  const now = new Date().toISOString();
  await dbq(
    `INSERT INTO categories (id, name, color, position, created_at) VALUES (?,?,?,?,?)`,
    [id, name, color, pos, now]
  );
  await loadCategories();
  render();
}

async function deleteCategory(id) {
  if (!await hubConfirm({ message: "Delete this category?", description: "Threads in it will become uncategorised.", confirmLabel: "Delete category", destructive: true })) return;
  await dbq(`UPDATE threads SET category_id=NULL WHERE category_id=?`, [id]);
  await dbq(`DELETE FROM categories WHERE id=?`, [id]);
  await loadCategories();
  render();
}

let modalEl = null;

  closeModal();
  modalEl = document.createElement("div");
  modalEl.className = "modal-backdrop";
  modalEl.innerHTML = `<div class="modal">${html}</div>`;

}

// ── Markdown toolbar helper ───────────────────────────────────────────────────
function wrapSelection(textareaId, before, after = before) {
  const ta = document.getElementById(textareaId);
  if (!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  const sel   = ta.value.slice(start, end) || "text";
  ta.value    = ta.value.slice(0, start) + before + sel + after + ta.value.slice(end);
  ta.focus();
  ta.setSelectionRange(start + before.length, start + before.length + sel.length);
}
function insertAtCursor(textareaId, text) {
  const ta = document.getElementById(textareaId);
  if (!ta) return;
  const pos  = ta.selectionStart;
  ta.value   = ta.value.slice(0, pos) + text + ta.value.slice(pos);
  ta.focus();
  ta.setSelectionRange(pos + text.length, pos + text.length);
}
window.mdBold      = id => wrapSelection(id, "**");
window.mdItalic    = id => wrapSelection(id, "*");
window.mdStrike    = id => wrapSelection(id, "~~");
window.mdCode      = id => wrapSelection(id, "`");
window.mdCodeBlock = id => wrapSelection(id, "```\n", "\n```");
window.mdQuote     = id => insertAtCursor(id, "\n> ");
window.mdLink      = id => wrapSelection(id, "[", "](https://)");
window.mdBullet    = id => insertAtCursor(id, "\n- ");

function mdToolbar(textareaId) {
  return `<div class="md-toolbar">
    <button type="button" onclick="mdBold('${textareaId}')"    title="Bold"><b>B</b></button>
    <button type="button" onclick="mdItalic('${textareaId}')"  title="Italic"><i>I</i></button>
    <button type="button" onclick="mdStrike('${textareaId}')"  title="Strikethrough"><s>S</s></button>
    <div class="sep-v"></div>
    <button type="button" onclick="mdCode('${textareaId}')"      title="Inline code">&#96;code&#96;</button>
    <button type="button" onclick="mdCodeBlock('${textareaId}')" title="Code block">{ }</button>
    <div class="sep-v"></div>
    <button type="button" onclick="mdQuote('${textareaId}')"  title="Blockquote">&gt;</button>
    <button type="button" onclick="mdLink('${textareaId}')"   title="Link">🔗</button>
    <button type="button" onclick="mdBullet('${textareaId}')" title="Bullet list">•</button>
  </div>`;
}

function renderReactionBar(targetId, targetType) {
  const summary = reactionSummary(reactions, targetId);
  const myId    = currentMember?.id ?? "";

    const reacted = hasReacted(reactions, targetId, emoji, myId);
    return `<button class="reaction-btn ${reacted ? "reacted" : ""}"
      onclick="doToggleReaction('${targetId}','${targetType}','${emoji}')">
      ${emoji} <span>${count}</span>
    </button>`;
  }).join("");

  const showPicker = pickerTarget?.targetId === targetId;
  const picker = showPicker
    ? `<div class="emoji-picker" style="display:inline-flex">
        ${REACTION_EMOJIS.map(e => `
          <button class="emoji-opt" onclick="doToggleReaction('${targetId}','${targetType}','${e}')">${e}</button>
        `).join("")}
        <button class="emoji-opt" onclick="closePicker()" style="font-size:.8rem;color:var(--muted)">✕</button>
      </div>`
    : `<button class="reaction-add" onclick="openPicker('${targetId}','${targetType}')">+ React</button>`;

  return `<div class="reactions">${counts}${picker}</div>`;
}

window.toggleNewThreadPreview = function() {
  previewMode = !previewMode;
  const wrap = document.getElementById("thread-body-wrap");
  const tog  = document.getElementById("thread-preview-toggle");
  if (previewMode) {
    const body = document.getElementById("thread-body")?.value ?? "";
    wrap.dataset.body = body;
    wrap.innerHTML = `<div class="md-body md-preview-area" id="thread-preview">${renderMarkdown(body)}</div>`;
    tog.textContent = "✏ Edit";
  } else {
    const body = wrap.dataset.body ?? "";
    wrap.innerHTML = `<textarea id="thread-body" rows="6" placeholder="Share your thoughts… markdown is supported">${esc(body)}</textarea>`;
    tog.textContent = "👁 Preview";
  }
};

window.submitNewThread = async function() {
  const title = document.getElementById("thread-title")?.value?.trim();
  const body  = document.getElementById("thread-body")?.value?.trim();
  const catId = document.getElementById("thread-cat")?.value;
  const errEl = document.getElementById("thread-error");

  if (!title) { showError(errEl, "Please add a title."); return; }
  if (!body)  { showError(errEl, "Please write something."); return; }
  errEl.style.display = "none";

  const btn = document.querySelector(".modal .btn-primary");
  if (btn) btn.disabled = true;

  try {
    const id = await createThread(title, body, catId);
    closeModal();
    await loadThreads();
    await openThreadById(id);
  } catch (e) {
    showError(errEl, e.message ?? "Could not post thread.");
    if (btn) btn.disabled = false;
  }
};

let _replyBodyCache = "";

window.syncReplyPreview = function(ta) { _replyBodyCache = ta.value; };

window.toggleReplyPreview = function() {
  if (!replyPreview) {
    // capture current value before switching to preview
    const ta = document.getElementById("reply-body");
    if (ta) _replyBodyCache = ta.value;
  }
  replyPreview = !replyPreview;
  renderThreadDetail();
  if (!replyPreview) {
    const ta = document.getElementById("reply-body");
    if (ta) { ta.value = _replyBodyCache; ta.focus(); }
  }
};

window.submitReply = async function() {
  const body  = (document.getElementById("reply-body")?.value ?? _replyBodyCache).trim();
  const errEl = document.getElementById("reply-error");
  if (!body) { showError(errEl, "Please write something."); return; }
  errEl.style.display = "none";

  const btn = document.querySelector(".reply-form .btn-primary");
  if (btn) btn.disabled = true;

  try {
    await createReply(currentThread.id, body);
    _replyBodyCache = "";
    replyPreview    = false;
    await loadThread(currentThread.id);
    render();
    // scroll to bottom of replies
    setTimeout(() => window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }), 50);
  } catch (e) {
    showError(errEl, e.message ?? "Could not post reply.");
    if (btn) btn.disabled = false;
  }
};

window.toggleSwatches = function(catId) {
  const el = document.getElementById(`swatches-${catId}`);
  if (el) el.style.display = el.style.display === "none" ? "block" : "none";
};

window.pickSwatch = function(btn, color) {
  const wrap = btn.closest(".color-swatches");
  wrap.querySelectorAll(".swatch").forEach(s => s.classList.remove("selected"));
  btn.classList.add("selected");
  const catId = wrap.dataset.target;
  if (catId) {
    const dot = document.querySelector(`[data-cat-id="${catId}"] .cat-dot`);
    if (dot) dot.style.background = color;
    saveCategory(catId, document.getElementById(`cat-name-${catId}`)?.value ?? "", color);
  }
};

window.pickNewSwatch = function(btn, _color) {
  document.querySelectorAll("#new-cat-swatches .swatch").forEach(s => s.classList.remove("selected"));
  btn.classList.add("selected");
};

window.onCatNameChange = function(catId) {
  const name  = document.getElementById(`cat-name-${catId}`)?.value ?? "";
  const color = document.querySelector(`[data-target="${catId}"] .swatch.selected`)?.dataset.color
             ?? categories.find(c => c.id === catId)?.color
             ?? "#6b7280";
  saveCategory(catId, name, color);
};

window.doAddCategory = async function() {
  const name  = document.getElementById("new-cat-name")?.value?.trim();
  const color = document.querySelector("#new-cat-swatches .swatch.selected")?.dataset.color ?? "#6b7280";
  if (!name) return;
  await addCategory(name, color);
  renderSettingsModal();
};

window.doDeleteCategory = id => deleteCategory(id).then(() => renderSettingsModal());

window.saveRetention = async function() {
  const val = parseInt(document.getElementById("auto-delete-days")?.value ?? "90", 10);
  const days = isNaN(val) || val < 0 ? 90 : val;
  await saveAutoDeleteDays(days);
  // Re-run cleanup immediately with new threshold
  await runAutoDelete();
  await loadThreads();
  render();
  renderSettingsModal();
};

};
window.setCategory = async function(id) {
  categoryFilter = id;
  await loadThreads();
  render();
};

window.openThread = async function(id) { await openThreadById(id); };
async function openThreadById(id) {
  await loadThread(id);
  if (!currentThread) return;
  view = "thread";
  _replyBodyCache = "";
  replyPreview    = false;
  render();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

window.backToList = async function() {
  view = "list";
  pickerTarget = null;
  await loadThreads();
  render();
};

window.doPin           = id => togglePin(id);
window.doDeleteThread  = id => deleteThread(id);
window.doDeleteReply   = id => deleteReply(id);
window.doToggleReaction = (tid, ttype, emoji) => toggleReaction(tid, ttype, emoji);

window.openPicker = function(targetId, targetType) {
  pickerTarget = { targetId, targetType };
  render();
};
window.closePicker = function() {
  pickerTarget = null;
  render();
};

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  if (!currentMember) { renderWhoScreen(); return; }
  if (view === "thread" && currentThread) { renderThreadDetail(); return; }
  renderThreadList();
}

function showError(el, msg) {
  if (!el) return;
  el.textContent = msg;
  el.style.display = "block";
}

// ── Deep link ─────────────────────────────────────────────────────────────────
function handleDeepLink() {
  const threadId = new URLSearchParams(window.location.search).get("threadId");
  if (!threadId) return;
  if (currentMember) {
    openThread(threadId);
  } else {
    pendingDeepLinkThreadId = threadId;
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  await Promise.all([loadMembers(), setupSchema()]);
  await runAutoDelete();   // silently prune old threads before loading
  await loadCategories();
  await loadThreads();

  if (HUB_MEMBER) {
    currentMember = members.find(m => m.id === HUB_MEMBER.id) ?? {
      id: HUB_MEMBER.id, name: HUB_MEMBER.name, role: HUB_MEMBER.role,
    };
  }
  render();
  handleDeepLink();
})();
</script>
</body>
</html>
