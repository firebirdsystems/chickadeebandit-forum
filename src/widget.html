<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum Widget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--hub-font, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: 13px;
      background: #fff;
      color: #111827;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
      border-bottom: 1px solid #e5e7eb;
      flex-shrink: 0;
    }
    .header-count { font-size: 11px; color: #6b7280; }

    .thread-list {
      flex: 1;
      overflow-y: auto;
    }

    .thread-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 14px;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: background .1s;
    }
    .thread-row:last-child { border-bottom: none; }
    .thread-row:hover { background: #f9fafb; }

    .cat-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .thread-main { flex: 1; min-width: 0; }
    .thread-title {
      font-size: 12.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.35;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .pin-icon { font-size: 10px; flex-shrink: 0; }
    .thread-meta {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 1px;
      display: flex;
      gap: 6px;
    }

    .reply-count {
      font-size: 11px;
      color: #9ca3af;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .footer {
      padding: 7px 14px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: #f9fafb;
    }
    .new-link {
      font-size: 11px;
      font-weight: 600;
      color: #111827;
      text-decoration: none;
      background: #111827;
      color: #fff;
      padding: 3px 10px;
      border-radius: 6px;
    }
    .open-link {
      font-size: 11px;
      font-weight: 600;
      color: #111827;
      text-decoration: none;
    }
    .open-link:hover { text-decoration: underline; }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #9ca3af;
      font-size: 12px;
      gap: 4px;
    }
  </style>
</head>
<body>
<script type="module">
import { esc, formatRelativeDate } from "/hub-sdk.js";
import { stripMarkdown } from "./logic.js";

const DB     = window.__DB_URL  ?? "";
const EVENTS = window.__EVENTS_URL ?? "";
const APP_ID = window.__APP_ID ?? "forum";

async function dbq(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sql, params }),
  });
  return res.json();
}

async function load() {
  const [{ rows: threads }, { rows: categories }] = await Promise.all([
    dbq(`SELECT t.id, t.title, t.pinned, t.category_id, t.author_name, t.created_at,
          (SELECT COUNT(*) FROM app_forum__replies WHERE thread_id = t.id) AS reply_count
         FROM app_forum__threads t
         ORDER BY t.pinned DESC, t.created_at DESC
         LIMIT 6`),
    dbq(`SELECT id, name, color FROM app_forum__categories`),
  ]);

  render(threads, categories);
}

function navigate(params = {}) {
  window.parent.postMessage({ type: "hub:open", appId: APP_ID, params }, "*");
}

function render(threads, categories) {
  const catMap = Object.fromEntries(categories.map(c => [c.id, c]));

  const header = `
    <div class="header">
      <span class="header-count">${threads.length === 6 ? "Latest threads" : `${threads.length} thread${threads.length !== 1 ? "s" : ""}`}</span>
    </div>`;

  let rows;
  if (threads.length === 0) {
    rows = `<div class="empty">
      <span>No threads yet</span>
      <button onclick="navigate()" style="color:#111827;font-weight:600;font-size:11px;background:none;border:none;cursor:pointer">Start a discussion →</button>
    </div>`;
  } else {
    rows = `<div class="thread-list">
      ${threads.map(t => {
        const cat  = catMap[t.category_id];
        const dot  = cat
          ? `<span class="cat-dot" style="background:${cat.color}" title="${esc(cat.name)}"></span>`
          : `<span class="cat-dot" style="background:#e5e7eb"></span>`;
        const pin  = t.pinned ? `<span class="pin-icon">📌</span>` : "";
        const cnt  = Number(t.reply_count);
        return `
          <button class="thread-row" onclick="navigate({threadId:'${t.id}'})" style="width:100%;text-align:left;background:none;border:none;border-bottom:1px solid #f3f4f6;">
            ${dot}
            <div class="thread-main">
              <div class="thread-title">${pin}${esc(t.title)}</div>
              <div class="thread-meta">
                <span>${esc(t.author_name)}</span>
                <span>·</span>
                <span>${formatRelativeDate(t.created_at)}</span>
              </div>
            </div>
            <span class="reply-count">${cnt} ${cnt === 1 ? "reply" : "replies"}</span>
          </button>`;
      }).join("")}
    </div>`;
  }

  const footer = `
    <div class="footer">
      <button class="open-link" onclick="navigate()" style="background:none;border:none;cursor:pointer;">View all →</button>
      <button class="new-link" onclick="navigate()" style="cursor:pointer;">+ New thread</button>
    </div>`;

  document.body.innerHTML = header + rows + footer;
}

load().catch(() => {
  document.body.innerHTML = `
    <div class="empty"><a href="/run/${APP_ID}" style="color:#111827;font-weight:600">Open Forum →</a></div>`;
});

// Poll for new threads and refresh the widget
if (EVENTS) {
  import("/hub-sdk.js").then(({ createEventPoller }) => {
    createEventPoller(EVENTS, "forum.thread.created", () => load().catch(() => {}), 60_000);
  });
}
</script>
</body>
</html>
